
services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # - DATABASE_URL=postgresql://postgres:password@postgres:5432/ai_trading
      - KRAKEN_API_KEY=${KRAKEN_API_KEY}
      - KRAKEN_API_SECRET=${KRAKEN_API_SECRET}
      - TRADING_PAPER_MODE=${TRADING_PAPER_MODE:-false}
      - EXECUTION_EXCHANGE_ID=${EXECUTION_EXCHANGE_ID:-krakenfutures}
      - MARKET_DATA_EXCHANGE_ID=${MARKET_DATA_EXCHANGE_ID:-krakenfutures}
      - KRAKEN_FUTURES_DEMO=${KRAKEN_FUTURES_DEMO:-true}
      - MOMENTUM_DEFAULT_SYMBOL=${MOMENTUM_DEFAULT_SYMBOL:-PI_XBTUSD}
      - MOMENTUM_AUTO_START=${MOMENTUM_AUTO_START:-true}
      - MOMENTUM_BUY_THRESHOLD=${MOMENTUM_BUY_THRESHOLD:-0.01}
      - MOMENTUM_SELL_THRESHOLD=${MOMENTUM_SELL_THRESHOLD:--0.01}
    depends_on:
      - postgres
      - prometheus
    volumes:
      - ./:/app
    networks:
      - trading

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=ai_trading
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trading

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - trading

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - trading

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  trading:
    driver: bridge
