services:
  - type: web
    name: ai-trading-backend
    env: docker
    plan: free
    branch: streamlit-deploy
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: TRADING_PAPER_MODE
        value: true
      - key: EXECUTION_EXCHANGE_ID
        value: krakenfutures
      - key: MARKET_DATA_EXCHANGE_ID
        value: krakenfutures
      - key: KRAKEN_FUTURES_DEMO
        value: true
      - key: MOMENTUM_DEFAULT_SYMBOL
        value: PI_XBTUSD
      - key: MOMENTUM_AUTO_START
        value: true
      - key: KRAKEN_API_KEY
        sync: false
      - key: KRAKEN_API_SECRET
        sync: false

  - type: web
    name: ai-trading-dashboard
    env: python
    plan: free
    branch: streamlit-deploy
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run dashboard/streamlit_app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    healthCheckPath: /
    envVars:
      - key: API_BASE_URL
        value: https://ai-trading-engd.onrender.com
      - key: WS_URL
        value: wss://ai-trading-engd.onrender.com/ws/price
      - key: STREAMLIT_APP_MODE
        value: backend-api
      - key: PYTHON_VERSION
        value: 3.12.9