services:
  - type: web
    name: ai-trading-backend
    env: docker
    plan: free
    branch: streamlit-deploy
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: TRADING_PAPER_MODE
        value: true
      - key: EXECUTION_EXCHANGE_ID
        value: krakenfutures
      - key: MARKET_DATA_EXCHANGE_ID
        value: krakenfutures
      - key: KRAKEN_FUTURES_DEMO
        value: true
      - key: MOMENTUM_DEFAULT_SYMBOL
        value: PI_XBTUSD
      - key: MOMENTUM_AUTO_START
        value: true
      - key: MAX_CONTRACTS_HARD_LIMIT
        value: 15
      - key: MOMENTUM_ENTRY_AUTO_SIZE_MAX_QTY
        value: 0.05
      - key: MAX_OPEN_POSITIONS
        value: 3
      - key: SCANNER_SYMBOLS
        value: PF_XBTUSD,PF_ETHUSD,PF_SOLUSD,PF_AVAXUSD,PF_ADAUSD
      - key: KRAKEN_API_KEY
        sync: false
      - key: KRAKEN_API_SECRET
        sync: false
      - key: RATE_LIMIT_WINDOW_SEC
        value: 60
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 120

  - type: web
    name: ai-trading-dashboard
    env: python
    plan: free
    branch: streamlit-deploy
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      bash -lc 'PROJECT_ROOT="${RENDER_PROJECT_ROOT:-/opt/render/project/src}";
      export PYTHONPATH="$PROJECT_ROOT:${PYTHONPATH}";
      streamlit run "$PROJECT_ROOT/dashboard/streamlit_app.py" --server.port "$PORT" --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false'
    healthCheckPath: /
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: API_BASE_URL
        value: https://ai-trading-engd.onrender.com
      - key: WS_URL
        value: wss://ai-trading-engd.onrender.com/ws/price
      - key: STREAMLIT_APP_MODE
        value: backend-api
      - key: SCANNER_SYMBOLS
        value: PF_XBTUSD,PF_ETHUSD,PF_SOLUSD,PF_AVAXUSD,PF_ADAUSD
      - key: DASHBOARD_AUTH_ENABLED
        value: true
      - key: DASHBOARD_AUTH_USERNAME
        value: admin
      - key: DASHBOARD_AUTH_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.9
