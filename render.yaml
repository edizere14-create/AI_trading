services:
  - type: web
    name: ai-trading-backend
    env: docker
    plan: free
    branch: streamlit-deploy
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: TRADING_PAPER_MODE
        value: true
      - key: EXECUTION_EXCHANGE_ID
        value: krakenfutures
      - key: MARKET_DATA_EXCHANGE_ID
        value: krakenfutures
      - key: KRAKEN_FUTURES_DEMO
        value: true
      - key: MOMENTUM_DEFAULT_SYMBOL
        value: PI_XBTUSD
      - key: MOMENTUM_AUTO_START
        value: true
      - key: KRAKEN_API_KEY
        sync: false
      - key: KRAKEN_API_SECRET
        sync: false

  - type: web
    name: ai-trading-dashboard
    env: node
    plan: free
    branch: streamlit-deploy
    autoDeploy: true
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run preview -- --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ai-trading-1-dwvg.onrender.com
      - key: VITE_POLL_MS
        value: 8000